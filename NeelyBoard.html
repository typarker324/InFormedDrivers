
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Spacing Techniques</title>
    <link rel="stylesheet" href="NeelyBoardStyle.css" />
  </head>
<body>
    <header class="masthead">
      <h1 class="site-title centeredText">Neely Board</h1>
    </header>

    <main class="main-area">
      <div class="centered">
        <section class="cards">
        

         <article class="card">
            <a href="#">
              <div class="pixHolder">
                <img src="neely_proj_images/fractions.jpg" alt="fractions" />
              </div>
              <div class="card-content">
                <h3>Math - Fractions</h3>
                <ul>
                  <li>half, quarter?</li>
                </ul>
              </div>
            </a>
          </article>

          <article class="card" status="important">
            <a href="#">
              <div class="pixHolder">
                <img src="neely_proj_images/words.jpg" alt="Weekly Word" />
              </div>
              <div class="card-content">
                <h3>Weekly Word</h3>
                <ul>
                  <li>character</li>
                </ul>
              </div>
            </a>
          </article>

          <article class="card" status="done">
            <a href="#">
              <div class="pixHolder">
                <img src="neely_proj_images/country.jpg" alt="Geography" />
              </div>
              <div class="card-content">
                <h3>Geography</h3>
                <ul>
                  <li>Where is Ukraine?</li>
                </ul>
              </div>
            </a>
          </article>

          <article class="card">
            <a href="#">
              <div class="pixHolder">
                <img src="neely_proj_images/presidents.jpg" alt="Presidents" />
              </div>
              <div class="card-content">
                <h3>Presidents</h3>
                <ul>
                  <li>first president?</li>
                </ul>
              </div>
            </a>
          </article>

          <article class="card">
            <a href="#">
              <div class="pixHolder">
                <img src="neely_proj_images/art.jpg" alt="Artist" />
              </div>
              <div class="card-content">
                <h3>Artist</h3>
                <ul>
                  <li>Cézanne</li>
                </ul>
              </div>
            </a>
          </article>

          <article class="card">
            <a href="#">
              <div class="pixHolder">
                <img src="neely_proj_images/finance.jpg" alt="Money" />
              </div>
              <div class="card-content">
                <h3>Money</h3>
                <ul>
                  <li>exchange rate</li>
                </ul>
              </div>
            </a>
          </article>

          <article class="card">
            <a href="#">
              <div class="pixHolder">
                <img src="neely_proj_images/sports.jpg" alt="Rugby" />
              </div>
              <div class="card-content">
                <h3>Rugby</h3>
                <ul>
                  <li>scrum</li>
                </ul>
              </div>
            </a>
          </article>

          <article class="card">
            <a href="#">
              <div class="pixHolder">
                <img src="neely_proj_images/nutrition.jpg" alt="Calcium" />
              </div>
              <div class="card-content">
                <h3>Calcium</h3>
                <ul>
                  <li>milk, cheese</li>
                </ul>
              </div>
            </a>
          </article>

        </section>
      </div>
    </main>
</body>

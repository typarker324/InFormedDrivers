<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>In-Formed Drivers</title>

    
    <link rel="stylesheet" href="DriversStyle.css" type="text/css">

    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="manifest" href="site.webmanifest">
</head>
<body>
  <header class= "main-header">
    <h1>Car Finders Inc</h1>
    <img src= "10.1_Add_Final_Highlights_on_the_Cartoon-Style_Car_Drawing.jpg__1000x1000_q65_subsampling-2-removebg-preview.png" alt= "Car Finders Inc" class= "logo">
    </header>
    <main class="form-container">
    <form>
        <fieldset>
            <legend>Vehicle Information</legend>
      <label for="title">Manufacturer:</label>
      <select id="manufacturer" name="manufacturer" required>
        <option value="">Select a manufacturer</option>
        <option value="ford">Ford</option>
        <option value="chevrolet">Chevrolet</option>
        <option value="toyota">Toyota</option>
      </select>

      <label for="title">Drive Options:</label>
      <input type="checkbox" id="drive-options" name="drive-options" value="front-wheel"> Front-Wheel Drive
      <input type="checkbox" id="drive-options" name="drive-options" value="rear-wheel"> Rear-Wheel Drive
      <input type="checkbox" id="drive-options" name="drive-options" value="four-wheel"> Four-Wheel Drive
      <input type="checkbox" id="drive-options" name="drive-options" value="all-wheel"> All-Wheel Drive

      <label for= "title">License Plate:</label>
      <input type="text" id="license" name="license" required>
          
      <label for="title">Year:</label>
      <input type="number" id="year" name="year" min="1980" max="2026" required>

        </fieldset>
    </form>
    
    <form>
        <fieldset>
         <legend>Personalized Design Options</legend>

         <label for="title">Color:</label>
         <input type="color" id="color" name="color" required>


         <label for="title">Interior Package:</label>
         <label for="standard">Standard</label>
         <input type="radio" id="standard" name="interior-package" value="standard" required>
         <label for="premium">Premium</label>
         <input type="radio" id="premium" name="interior-package" value="premium" required>
        </fieldset> 
    </form>

    <label for="comments">Comments:</label>
    <textarea id="comments" name="comments" rows="4" required></textarea>

    <button type="submit">Submit</button>


    </main>
</body>
</html>
